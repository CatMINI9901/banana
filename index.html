<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日の単語</title>
    <style>
        /* デザイン設定 */
        :root {
            --bg-color: #f0f7ff;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #666666;
            --accent-color: #ff9a9e;
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 全体のコンテナ */
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 1.2s ease-out; /* フェードイン演出 */
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .sub-text {
            font-size: 0.9rem;
            color: var(--text-sub);
            margin-bottom: 24px;
        }

        /* ひらがなを表示するカード */
        .card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
        }

        /* 6文字の並び */
        .hiragana-display {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 0.5rem; /* 文字の間隔をあける */
            word-break: break-all;
            color: var(--text-main);
            line-height: 1.4;
        }

        /* 日付表示 */
        .date-display {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-sub);
            border-top: 2px dashed #eee;
            display: inline-block;
            margin-top: 20px;
            padding-top: 10px;
        }

        /* フェードインのアニメーション */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* スマホ向けの微調整 */
        @media (max-width: 480px) {
            .hiragana-display {
                font-size: 2.2rem;
                letter-spacing: 0.3rem;
            }
            h1 {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>今日の単語</h1>
        <p class="sub-text">毎日0時に変わります</p>

        <div class="card">
            <div id="hiragana-result" class="hiragana-display">
                </div>
            <div id="date-label" class="date-display">
                </div>
        </div>
    </div>

    <script>
        /**
         * ひらがなのリスト（小文字・濁点などを除いた基本の46文字）
         */
        const hiraganaList = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわをん";

        /**
         * 疑似乱数生成器 (Mulberry32)
         * 同じシード値（数字）を与えると、必ず同じランダムな数値の列を返します。
         */
        function sfc32(seed) {
            return function() {
                seed |= 0; seed = seed + 0x6D2B79F5 | 0;
                let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
                t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            };
        }

        /**
         * メイン処理
         */
        function generateDailyHiragana() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth() + 1;
            const day = now.getDate();

            // 1. 日付からユニークなシード値を作成 (例: 20240520)
            const seed = year * 10000 + month * 100 + day;
            
            // 2. シード値を使って乱数生成関数を初期化
            const rand = sfc32(seed);

            // 3. 6文字をランダムに選出
            let result = "";
            for (let i = 0; i < 6; i++) {
                const index = Math.floor(rand() * hiraganaList.length);
                result += hiraganaList[index];
            }

            // 4. 画面に反映
            document.getElementById('hiragana-result').textContent = result;
            document.getElementById('date-label').textContent = `${year}年${month}月${day}日`;
        }

        // 実行
        generateDailyHiragana();
    </script>
</body>
</html>
